<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校数学Ⅲ グラフ道場</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Recharts -->
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: sans-serif; background-color: #f8fafc; color: #1e293b; }
        .katex { font-size: 1.1em; }
        .katex-display { margin: 0; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-down { animation: slideDown 0.4s ease-out forwards; overflow: hidden; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; }
            to { opacity: 1; max-height: 2000px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, ReferenceLine, ReferenceDot, ResponsiveContainer } = window.Recharts;

        // --- Icons ---
        const IconFileText = () => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>);
        const IconShuffle = () => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>);
        const IconChevronDown = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"/></svg>);
        const IconCheckCircle = () => (<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>);

        // --- Math Components ---
        const MathText = ({ math }) => {
            const html = katex.renderToString(math, { throwOnError: false });
            return <span dangerouslySetInnerHTML={{ __html: html }} />;
        };

        const RichText = ({ text }) => {
            const parts = text.split('$');
            return (
                <React.Fragment>
                    {parts.map((p, i) => (
                        i % 2 === 1 ? <MathText key={i} math={p} /> : <span key={i}>{p}</span>
                    ))}
                </React.Fragment>
            );
        };

        // --- Problems Database ---
        const problems = [
            {
                id: "prob1",
                funcText: "y = x e^{-x}",
                y1: "y' = (1-x)e^{-x}",
                y2: "y'' = (x-2)e^{-x}",
                table: {
                    x: ["\\cdots", "1", "\\cdots", "2", "\\cdots"],
                    y1: ["+", "0", "-", "-", "-"],
                    y2: ["-", "-", "-", "0", "+"],
                    y: ["IncUp", "1/e", "DecUp", "2/e^2", "DecDown"]
                },
                features: ["極大: $x=1$ のとき $1/e$", "変曲点: $(2, 2/e^2)$", "漸近線: $x$軸 ($\\displaystyle \\lim_{x \\to \\infty} y = 0$)"],
                plot: {
                    domain: [-1.5, 6], yDomain: [-1, 0.5], func: (x) => x * Math.exp(-x),
                    asymptotes: [{ type: 'horizontal', value: 0 }],
                    points: [{ x: 1, y: 1/Math.E, label: "極大" }, { x: 2, y: 2*Math.exp(-2), label: "変曲点" }]
                }
            },
            {
                id: "prob2",
                funcText: "y = \\frac{\\log x}{x}",
                funcCondition: "($x > 0$)",
                y1: "y' = \\frac{1-\\log x}{x^2}",
                y2: "y'' = \\frac{2\\log x - 3}{x^3}",
                table: {
                    x: ["(0)", "\\cdots", "e", "\\cdots", "e\\sqrt{e}", "\\cdots"],
                    y1: ["slash", "+", "0", "-", "-", "-"],
                    y2: ["slash", "-", "-", "-", "0", "+"],
                    y: ["slash", "IncUp", "1/e", "DecUp", "\\frac{3}{2e\\sqrt{e}}", "DecDown"]
                },
                features: ["極大: $x=e$ のとき $1/e$", "変曲点: $(e\\sqrt{e}, \\frac{3}{2e\\sqrt{e}})$", "漸近線: $x=0$, $y=0$"],
                plot: {
                    domain: [0.01, 12], yDomain: [-1, 0.5], func: (x) => x <= 0 ? null : (Math.log(x) / x),
                    asymptotes: [{ type: 'vertical', value: 0 }, { type: 'horizontal', value: 0 }],
                    points: [{ x: Math.E, y: 1/Math.E, label: "極大" }, { x: Math.exp(1.5), y: 1.5*Math.exp(-1.5), label: "変曲点" }]
                }
            },
            {
                id: "prob3",
                funcText: "y = \\frac{x^2}{x-1}",
                funcCondition: "($x \\neq 1$)",
                y1: "y' = \\frac{x(x-2)}{(x-1)^2}",
                y2: "y'' = \\frac{2}{(x-1)^3}",
                table: {
                    x: ["\\cdots", "0", "\\cdots", "1", "\\cdots", "2", "\\cdots"],
                    y1: ["+", "0", "-", "slash", "-", "0", "+"],
                    y2: ["-", "-", "-", "slash", "+", "+", "+"],
                    y: ["IncUp", "0", "DecUp", "slash", "DecDown", "4", "IncDown"]
                },
                features: ["極大: $x=0$ のとき $0$", "極小: $x=2$ のとき $4$", "漸近線: $x=1$, $y=x+1$"],
                plot: {
                    domain: [-3, 5], yDomain: [-5, 10], func: (x) => Math.abs(x - 1) < 0.1 ? null : (x*x) / (x-1),
                    asymptotes: [{ type: 'vertical', value: 1 }, { type: 'oblique', func: x => x+1 }],
                    points: [{ x: 0, y: 0, label: "極大" }, { x: 2, y: 4, label: "極小" }]
                }
            },
            {
                id: "prob4",
                funcText: "y = e^{-x^2}",
                y1: "y' = -2xe^{-x^2}",
                y2: "y'' = 2(2x^2-1)e^{-x^2}",
                table: {
                    x: ["\\cdots", "-\\frac{1}{\\sqrt{2}}", "\\cdots", "0", "\\cdots", "\\frac{1}{\\sqrt{2}}", "\\cdots"],
                    y1: ["+", "+", "+", "0", "-", "-", "-"],
                    y2: ["+", "0", "-", "-", "-", "0", "+"],
                    y: ["IncDown", "1/\\sqrt{e}", "IncUp", "1", "DecUp", "1/\\sqrt{e}", "DecDown"]
                },
                features: ["極大: $x=0$ のとき $1$", "変曲点: $(\\pm \\frac{1}{\\sqrt{2}}, \\frac{1}{\\sqrt{e}})$", "漸近線: $y=0$"],
                plot: {
                    domain: [-3, 3], yDomain: [-0.2, 1.2], func: (x) => Math.exp(-x*x),
                    asymptotes: [{ type: 'horizontal', value: 0 }],
                    points: [{ x: -1/Math.SQRT2, y: Math.exp(-0.5), label: "変曲点" }, { x: 0, y: 1, label: "極大" }, { x: 1/Math.SQRT2, y: Math.exp(-0.5), label: "変曲点" }]
                }
            },
            {
                id: "prob5",
                funcText: "y = x - \\sin x",
                funcCondition: "($0 \\le x \\le 2\\pi$)",
                y1: "y' = 1 - \\cos x",
                y2: "y'' = \\sin x",
                table: {
                    x: ["0", "\\cdots", "\\pi", "\\cdots", "2\\pi"],
                    y1: ["0", "+", "+", "+", "0"],
                    y2: ["0", "+", "0", "-", "0"],
                    y: ["0", "IncDown", "\\pi", "IncUp", "2\\pi"]
                },
                features: ["極値なし (単調増加)", "変曲点: $(\\pi, \\pi)$"],
                plot: {
                    domain: [0, 2*Math.PI], yDomain: [-0.5, 6.5], func: (x) => x - Math.sin(x),
                    asymptotes: [],
                    points: [{ x: 0, y: 0, label: "" }, { x: Math.PI, y: Math.PI, label: "変曲点" }, { x: 2*Math.PI, y: 2*Math.PI, label: "" }]
                }
            }
        ];

        // --- Components ---
        const CurveIcon = ({ type }) => {
            if (type === 'IncUp') return <svg width="24" height="24" viewBox="0 0 24 24" className="stroke-blue-600 fill-none mx-auto" strokeWidth="2"><path d="M 4 20 Q 4 4 20 4"/><path d="M 14 4 L 20 4 L 20 10"/></svg>;
            if (type === 'IncDown') return <svg width="24" height="24" viewBox="0 0 24 24" className="stroke-blue-600 fill-none mx-auto" strokeWidth="2"><path d="M 4 20 Q 20 20 20 4"/><path d="M 14 4 L 20 4 L 20 10"/></svg>;
            if (type === 'DecUp') return <svg width="24" height="24" viewBox="0 0 24 24" className="stroke-blue-600 fill-none mx-auto" strokeWidth="2"><path d="M 4 4 Q 20 4 20 20"/><path d="M 14 20 L 20 20 L 20 14"/></svg>;
            if (type === 'DecDown') return <svg width="24" height="24" viewBox="0 0 24 24" className="stroke-blue-600 fill-none mx-auto" strokeWidth="2"><path d="M 4 4 Q 4 20 20 20"/><path d="M 14 20 L 20 20 L 20 14"/></svg>;
            if (type === 'slash') return <span className="text-slate-300 font-bold text-xl px-2">/</span>;
            if (type === 'none') return <span />;
            return <MathText math={type} />;
        };

        const Zougenhyou = ({ table }) => (
            <div className="overflow-x-auto my-6 w-full flex justify-center">
                <table className="border-collapse border-2 border-slate-700 text-center bg-white shadow-sm text-base md:text-lg select-none">
                    <tbody>
                        <tr>
                            <th className="border border-slate-400 p-2 md:p-3 bg-slate-50 min-w-[3rem]"><MathText math="x" /></th>
                            {table.x.map((item, i) => <td key={i} className="border border-slate-400 p-2 md:p-3 min-w-[3rem] md:min-w-[4rem]"><MathText math={item} /></td>)}
                        </tr>
                        <tr>
                            <th className="border border-slate-400 p-2 md:p-3 bg-slate-50"><MathText math="y'" /></th>
                            {table.y1.map((item, i) => <td key={i} className="border border-slate-400 p-2 md:p-3 text-red-600 font-bold">{item === 'slash' ? <span className="text-slate-300 px-2">/</span> : <MathText math={item} />}</td>)}
                        </tr>
                        <tr>
                            <th className="border border-slate-400 p-2 md:p-3 bg-slate-50"><MathText math="y''" /></th>
                            {table.y2.map((item, i) => <td key={i} className="border border-slate-400 p-2 md:p-3 text-blue-600 font-bold">{item === 'slash' ? <span className="text-slate-300 px-2">/</span> : <MathText math={item} />}</td>)}
                        </tr>
                        <tr>
                            <th className="border border-slate-400 p-2 md:p-3 bg-slate-50"><MathText math="y" /></th>
                            {table.y.map((item, i) => <td key={i} className="border border-slate-400 p-2 md:p-3 h-12 md:h-16"><CurveIcon type={item} /></td>)}
                        </tr>
                    </tbody>
                </table>
            </div>
        );

        const GraphPlot = ({ plot }) => {
            const data = useMemo(() => {
                const d = []; const [minX, maxX] = plot.domain;
                const step = (maxX - minX) / 800; const [yMin, yMax] = plot.yDomain;
                for (let x = minX; x <= maxX; x += step) {
                    let y = plot.func(x);
                    if (y === null || isNaN(y) || y > yMax + (yMax-yMin) || y < yMin - (yMax-yMin)) d.push({ x, y: null });
                    else d.push({ x, y });
                }
                return d;
            }, [plot]);

            return (
                <div className="w-full h-80 sm:h-[28rem] select-none bg-white border border-slate-200 rounded-xl p-2 md:p-6 shadow-sm overflow-hidden">
                    <ResponsiveContainer width="100%" height="100%">
                        <LineChart data={data} margin={{ top: 20, right: 30, left: 10, bottom: 20 }}>
                            <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                            <XAxis dataKey="x" type="number" domain={plot.domain} stroke="#64748b" tick={{fontSize: 13}} tickFormatter={v => Number.isInteger(v)?v:v.toFixed(1)} />
                            <YAxis type="number" domain={plot.yDomain} stroke="#64748b" tick={{fontSize: 13}} tickFormatter={v => Number.isInteger(v)?v:v.toFixed(1)} />
                            <ReferenceLine x={0} stroke="#334155" strokeWidth={1.5} />
                            <ReferenceLine y={0} stroke="#334155" strokeWidth={1.5} />
                            {plot.asymptotes.map((a, i) => {
                                if (a.type === 'vertical') return <ReferenceLine key={i} x={a.value} stroke="#ef4444" strokeDasharray="5 5" strokeWidth={1.5} />;
                                if (a.type === 'horizontal') return <ReferenceLine key={i} y={a.value} stroke="#ef4444" strokeDasharray="5 5" strokeWidth={1.5} />;
                                if (a.type === 'oblique') return <ReferenceLine key={i} segment={[{x:plot.domain[0],y:a.func(plot.domain[0])}, {x:plot.domain[1],y:a.func(plot.domain[1])}]} stroke="#ef4444" strokeDasharray="5 5" strokeWidth={1.5} />;
                                return null;
                            })}
                            <Line type="monotone" dataKey="y" stroke="#2563eb" strokeWidth={3} dot={false} isAnimationActive={false} connectNulls={false} />
                            {plot.points.map((p, i) => (
                                <ReferenceDot key={i} x={p.x} y={p.y} r={5} fill="#2563eb" stroke="#ffffff" strokeWidth={2} label={{ position: p.y > (plot.yDomain[0]+plot.yDomain[1])/2 ? 'bottom' : 'top', value: p.label, fill: '#1e293b', fontSize: 14, fontWeight: 600, offset: 10 }} />
                            ))}
                        </LineChart>
                    </ResponsiveContainer>
                </div>
            );
        };

        const App = () => {
            const [problem, setProblem] = useState(null);
            const [showSolution, setShowSolution] = useState(false);

            useEffect(() => { generateProblem(); }, []);

            const generateProblem = () => {
                const available = problems.filter(p => !problem || p.id !== problem.id);
                setProblem(available[Math.floor(Math.random() * available.length)]);
                setShowSolution(false);
            };

            if (!problem) return null;

            return (
                <div className="min-h-screen pb-24">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
                        <div className="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white"><IconFileText /></div>
                                <h1 className="text-xl font-bold text-slate-900">高校数学Ⅲ グラフ道場</h1>
                            </div>
                            <button onClick={generateProblem} className="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-full font-medium text-slate-700 border border-slate-200">
                                <IconShuffle /> <span className="hidden sm:inline">ランダム出題</span>
                            </button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 py-8 space-y-8">
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden fade-in">
                            <div className="bg-slate-800 text-white px-6 py-4 flex flex-wrap gap-3 items-center">
                                <span className="bg-blue-500 text-xs font-bold px-2 py-1.5 rounded uppercase">Question</span>
                                <h2 className="text-lg font-medium">次の関数の増減、極値、漸近線を調べ、グラフの概形をかけ。</h2>
                            </div>
                            <div className="p-8 md:p-12 text-center flex flex-col items-center min-h-[12rem] justify-center overflow-x-auto">
                                <div className="text-4xl md:text-5xl py-4"><MathText math={problem.funcText} /></div>
                                {problem.funcCondition && <div className="text-xl md:text-2xl text-slate-500 mt-2"><RichText text={problem.funcCondition} /></div>}
                            </div>
                        </div>

                        {!showSolution && (
                            <div className="flex justify-center fade-in">
                                <button onClick={() => setShowSolution(true)} className="group flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-full font-bold text-lg shadow-lg">
                                    <span>解答を見る</span>
                                    <IconChevronDown className="group-hover:translate-y-1 transition-transform" />
                                </button>
                            </div>
                        )}

                        {showSolution && (
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-300 slide-down">
                                <div className="bg-blue-50 border-b border-blue-100 p-6 flex items-center gap-3">
                                    <span className="text-blue-600"><IconCheckCircle /></span>
                                    <h2 className="text-2xl font-bold text-slate-800">解答・解説</h2>
                                </div>
                                
                                <div className="p-6 md:p-10 space-y-12">
                                    <section className="space-y-4">
                                        <h3 className="text-xl font-bold flex items-center gap-2"><span className="bg-blue-100 text-blue-700 w-8 h-8 rounded-full flex items-center justify-center text-sm">1</span>導関数</h3>
                                        <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 flex flex-col gap-5 text-xl overflow-x-auto">
                                            <div><RichText text={`$${problem.y1}$`} /></div>
                                            <div><RichText text={`$${problem.y2}$`} /></div>
                                        </div>
                                    </section>
                                    
                                    <section className="space-y-4">
                                        <h3 className="text-xl font-bold flex items-center gap-2"><span className="bg-blue-100 text-blue-700 w-8 h-8 rounded-full flex items-center justify-center text-sm">2</span>増減表</h3>
                                        <Zougenhyou table={problem.table} />
                                    </section>
                                    
                                    <section className="space-y-4">
                                        <h3 className="text-xl font-bold flex items-center gap-2"><span className="bg-blue-100 text-blue-700 w-8 h-8 rounded-full flex items-center justify-center text-sm">3</span>極値・変曲点・漸近線</h3>
                                        <ul className="list-disc list-inside space-y-3 text-lg pl-2 bg-slate-50 p-6 rounded-xl border border-slate-200">
                                            {problem.features.map((ft, i) => <li key={i}><RichText text={ft} /></li>)}
                                        </ul>
                                    </section>
                                    
                                    <section className="space-y-4">
                                        <h3 className="text-xl font-bold flex items-center gap-2"><span className="bg-blue-100 text-blue-700 w-8 h-8 rounded-full flex items-center justify-center text-sm">4</span>グラフの概形</h3>
                                        <GraphPlot plot={problem.plot} />
                                    </section>
                                    
                                    <div className="pt-8 border-t border-slate-200 flex justify-center">
                                        <button onClick={() => { window.scrollTo({top:0, behavior:'smooth'}); setTimeout(generateProblem, 300); }} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-900 text-white px-8 py-4 rounded-full font-bold text-lg shadow-xl">
                                            <IconShuffle /><span>次の問題に挑戦</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = document.getElementById('root');
        ReactDOM.createRoot(root).render(<App />);
    </script>
</body>
</html>
