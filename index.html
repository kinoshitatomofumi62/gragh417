                y1: "y' = x e^x", y2: "y'' = (x+1)e^x",
                table: { x: ["\\cdots", "-1", "\\cdots", "0", "\\cdots"], y1: ["-", "-", "-", "0", "+"], y2: ["-", "0", "+", "+", "+"], y: ["DecDown", "-2/e", "DecUp", "-1", "IncUp"] },
                features: ["極小: $x=0$ のとき $-1$", "変曲点: $(-1, -2/e)$", "漸近線: $y=0$"], plot: { domain: [-4, 2], yDomain: [-1.5, 3], func: x => (x-1)*Math.exp(x), asymptotes: [{ type: 'horizontal', value: 0 }], points: [{ x: 0, y: -1, label: "極小" }] }
            },
            {
                id: "prob18", difficulty: 2, funcText: "y = \\frac{1+\\log x}{x}", funcCondition: "($x > 0$)",
                y1: "y' = \\frac{-\\log x}{x^2}", y2: "y'' = \\frac{2\\log x - 1}{x^3}",
                table: { x: ["(0)", "\\cdots", "1", "\\cdots", "\\sqrt{e}", "\\cdots"], y1: ["slash", "+", "0", "-", "-", "-"], y2: ["slash", "-", "-", "-", "0", "+"], y: ["slash", "IncDown", "1", "DecDown", "\\frac{3}{2\\sqrt{e}}", "DecUp"] },
                features: ["極大: $x=1$ のとき $1$", "変曲点: $(\\sqrt{e}, \\frac{3}{2\\sqrt{e}})$", "漸近線: $x=0, y=0$"], plot: { domain: [0.01, 8], yDomain: [-2, 1.5], func: x => x <= 0 ? null : (1+Math.log(x))/x, asymptotes: [{ type: 'vertical', value: 0 }, { type: 'horizontal', value: 0 }], points: [{ x: 1, y: 1, label: "極大" }] }
            },
            {
                id: "prob19", difficulty: 1, funcText: "y = |\\log x|", funcCondition: "($x > 0$)",
                y1: "y' = \\begin{cases} \\frac{1}{x} & (x > 1) \\\\ -\\frac{1}{x} & (0 < x < 1) \\end{cases}", y2: "y'' = \\begin{cases} -\\frac{1}{x^2} & (x > 1) \\\\ \\frac{1}{x^2} & (0 < x < 1) \\end{cases}",
                table: { x: ["(0)", "\\cdots", "1", "\\cdots"], y1: ["slash", "-", "slash", "+"], y2: ["slash", "+", "slash", "-"], y: ["slash", "DecUp", "0", "IncDown"] },
                features: ["極小(尖点): $x=1$ のとき $0$ (微分不可能)", "変曲点: なし", "漸近線: $x=0$"], plot: { domain: [0.01, 5], yDomain: [-0.5, 3], func: x => x<=0 ? null : Math.abs(Math.log(x)), asymptotes: [{type: 'vertical', value: 0}], points: [{x: 1, y: 0, label: "尖点(極小)"}] }
            },
            {
                id: "prob20", difficulty: 3, funcText: "y = x^{\\frac{2}{3}}(x-5)",
                y1: "y' = \\frac{5(x-2)}{3\\sqrt[3]{x}}", y2: "y'' = \\frac{10(x+1)}{9x\\sqrt[3]{x}}",
                table: { x: ["\\cdots", "-1", "\\cdots", "0", "\\cdots", "2", "\\cdots"], y1: ["+", "+", "+", "slash", "-", "0", "+"], y2: ["-", "0", "+", "slash", "+", "+", "+"], y: ["IncDown", "-6", "IncUp", "0", "DecUp", "-3\\sqrt[3]{4}", "IncUp"] },
                features: ["極大(尖点): $x=0$ のとき $0$ (微分不可能)", "極小: $x=2$ のとき $-3\\sqrt[3]{4}$", "変曲点: $(-1, -6)$"], plot: { domain: [-3, 5], yDomain: [-8, 5], func: x => Math.pow(Math.abs(x), 2/3) * (x - 5), asymptotes: [], points: [{x: 0, y: 0, label: "尖点(極大)"}, {x: 2, y: -4.762, label: "極小"}, {x: -1, y: -6, label: "変曲点"}] }
            },
            {
                id: "prob21", difficulty: 1, funcText: "y = e^{-|x|}",
                y1: "y' = \\begin{cases} -e^{-x} & (x > 0) \\\\ e^x & (x < 0) \\end{cases}", y2: "y'' = \\begin{cases} e^{-x} & (x > 0) \\\\ e^x & (x < 0) \\end{cases}",
                table: { x: ["\\cdots", "0", "\\cdots"], y1: ["+", "slash", "-"], y2: ["+", "slash", "+"], y: ["IncUp", "1", "DecUp"] },
                features: ["極大(尖点): $x=0$ のとき $1$ (微分不可能)", "変曲点: なし", "漸近線: $y=0$"], plot: { domain: [-4, 4], yDomain: [-0.2, 1.2], func: x => Math.exp(-Math.abs(x)), asymptotes: [{type: 'horizontal', value: 0}], points: [{x: 0, y: 1, label: "尖点(極大)"}] }
            },
            {
                id: "prob22", difficulty: 2, funcText: "y = \\frac{|x|}{x-1}", funcCondition: "($x \\neq 1$)",
                y1: "y' = \\begin{cases} -\\frac{1}{(x-1)^2} & (x > 0) \\\\ \\frac{1}{(x-1)^2} & (x < 0) \\end{cases}", y2: "y'' = \\begin{cases} \\frac{2}{(x-1)^3} & (x > 0) \\\\ -\\frac{2}{(x-1)^3} & (x < 0) \\end{cases}",
                table: { x: ["\\cdots", "0", "\\cdots", "1", "\\cdots"], y1: ["+", "slash", "-", "slash", "-"], y2: ["+", "slash", "-", "slash", "+"], y: ["IncUp", "0", "DecDown", "slash", "DecUp"] },
                features: ["極大(尖点): $x=0$ のとき $0$ (微分不可能)", "漸近線: $x=1$, $y=1$ ($x \\to \\infty$), $y=-1$ ($x \\to -\\infty$)"], plot: { domain: [-5, 5], yDomain: [-4, 4], func: x => Math.abs(x-1) < 0.1 ? null : Math.abs(x)/(x-1), asymptotes: [{type: 'vertical', value: 1}, {type: 'horizontal', value: 1}, {type: 'horizontal', value: -1}], points: [{x: 0, y: 0, label: "尖点(極大)"}] }
            }
        ];

        // --- View Components (SVGパスを一般的な矢印へ完全修正) ---
        const CurveIcon = ({ type }) => {
            if (type === 'slash') {
                return <span className="text-slate-300 font-bold text-xl px-2">/</span>;
            }
            if (type === 'none') {
                return <span />;
            }
            // "IncUp"等のタグ付けは変更せず、描画されるSVGの中身のみを修正
            if (['IncUp', 'IncDown', 'DecUp', 'DecDown'].includes(type)) {
                let pathD = "";
                // Control(Qの後)を中点に対してどちらに逸らすかで凹凸を制御
                if (type === 'IncUp') pathD = "M 8 32 Q 28 28 32 8";     // 増加・下に凸のカーブ（∪の右半分）
                if (type === 'IncDown') pathD = "M 8 32 Q 12 12 32 8";   // 増加・上に凸のカーブ（∩の左半分）
                if (type === 'DecUp') pathD = "M 8 8 Q 12 28 32 32";     // 減少・下に凸のカーブ（∪の左半分）
                if (type === 'DecDown') pathD = "M 8 8 Q 28 12 32 32";   // 減少・上に凸のカーブ（∩の右半分）

                return (
                    <span className="inline-flex items-center justify-center">
                        <svg width="28" height="28" viewBox="0 0 40 40" className="stroke-blue-600 fill-none overflow-visible" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                            <defs>
                                <marker id={`arrow-${type}`} viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                                    <path d="M 2 2 L 8 5 L 2 8" className="stroke-blue-600 fill-none" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                                </marker>
                            </defs>
                            <path d={pathD} markerEnd={`url(#arrow-${type})`} />
                        </svg>
                    </span>
                );
            }
            return <MathText math={type} />;
        };

        const Zougenhyou = ({ table }) => (
            <div className="overflow-x-auto my-6 w-full flex justify-center">
                <table className="border-collapse border-2 border-slate-700 text-center bg-white shadow-sm font-sans text-base md:text-lg select-none">
                    <tbody>
                        <tr>
                            <th className="border border-slate-400 p-2 md:p-3 bg-slate-50 min-w-[3rem]"><MathText math="x" /></th>
                            {table.x.map((item, i) => <td key={i} className="border border-slate-400 p-2 md:p-3 min-w-[3rem] md:min-w-[4rem]"><MathText math={item} /></td>)}
                        </tr>
                        <tr>
                            <th className="border border-slate-400 p-2 md:p-3 bg-slate-50"><MathText math="y'" /></th>
                            {table.y1.map((item, i) => <td key={i} className="border border-slate-400 p-2 md:p-3 text-red-600 font-bold">{item === 'slash' ? <span className="text-slate-300 px-2">/</span> : <MathText math={item} />}</td>)}
                        </tr>
                        <tr>
                            <th className="border border-slate-400 p-2 md:p-3 bg-slate-50"><MathText math="y''" /></th>
                            {table.y2.map((item, i) => <td key={i} className="border border-slate-400 p-2 md:p-3 text-blue-600 font-bold">{item === 'slash' ? <span className="text-slate-300 px-2">/</span> : <MathText math={item} />}</td>)}
                        </tr>
                        <tr>
                            <th className="border border-slate-400 p-2 md:p-3 bg-slate-50"><MathText math="y" /></th>
                            {table.y.map((item, i) => <td key={i} className="border border-slate-400 p-2 md:p-3 h-12 md:h-16"><CurveIcon type={item} /></td>)}
                        </tr>
                    </tbody>
                </table>
            </div>
        );

        const GraphPlot = ({ plot }) => {
            const data = useMemo(() => {
                const d = []; const [minX, maxX] = plot.domain;
                const step = (maxX - minX) / 800; const [yMin, yMax] = plot.yDomain;
                for (let x = minX; x <= maxX; x += step) {
                    let y = plot.func(x);
                    if (y === null || isNaN(y) || y > yMax + (yMax-yMin) || y < yMin - (yMax-yMin)) d.push({ x, y: null });
                    else d.push({ x, y });
                }
                return d;
            }, [plot]);

            return (
                <div className="w-full h-80 sm:h-[28rem] select-none bg-white border border-slate-200 rounded-xl p-2 md:p-6 shadow-sm overflow-hidden">
                    <ResponsiveContainer width="100%" height="100%">
                        <LineChart data={data} margin={{ top: 20, right: 30, left: 10, bottom: 20 }}>
                            <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                            <XAxis dataKey="x" type="number" domain={plot.domain} stroke="#64748b" tick={{fontSize: 13}} tickFormatter={v => Number.isInteger(v)?v:v.toFixed(1)} />
                            <YAxis type="number" domain={plot.yDomain} stroke="#64748b" tick={{fontSize: 13}} tickFormatter={v => Number.isInteger(v)?v:v.toFixed(1)} />
                            <ReferenceLine x={0} stroke="#334155" strokeWidth={1.5} />
                            <ReferenceLine y={0} stroke="#334155" strokeWidth={1.5} />
                            {plot.asymptotes.map((a, i) => {
                                if (a.type === 'vertical') return <ReferenceLine key={i} x={a.value} stroke="#ef4444" strokeDasharray="5 5" strokeWidth={1.5} />;
                                if (a.type === 'horizontal') return <ReferenceLine key={i} y={a.value} stroke="#ef4444" strokeDasharray="5 5" strokeWidth={1.5} />;
                                if (a.type === 'oblique') return <ReferenceLine key={i} segment={[{x:plot.domain[0],y:a.func(plot.domain[0])}, {x:plot.domain[1],y:a.func(plot.domain[1])}]} stroke="#ef4444" strokeDasharray="5 5" strokeWidth={1.5} />;
                                return null;
                            })}
                            <Line type="monotone" dataKey="y" stroke="#2563eb" strokeWidth={3} dot={false} isAnimationActive={false} connectNulls={false} />
                            {plot.points.map((p, i) => (
                                <ReferenceDot key={i} x={p.x} y={p.y} r={5} fill="#2563eb" stroke="#ffffff" strokeWidth={2} label={{ position: p.y > (plot.yDomain[0]+plot.yDomain[1])/2 ? 'bottom' : 'top', value: p.label, fill: '#1e293b', fontSize: 14, fontWeight: 600, offset: 10 }} />
                            ))}
                        </LineChart>
                    </ResponsiveContainer>
                </div>
            );
        };

        const DIFFICULTY_LABELS = { all: '全レベル', 1: '基礎', 2: '標準', 3: '応用' };

        const App = () => {
            const [problem, setProblem] = useState(null);
            const [showSolution, setShowSolution] = useState(false);
            const [difficulty, setDifficulty] = useState('all');
            const [isRandom, setIsRandom] = useState(true);
            const [currentIndex, setCurrentIndex] = useState(0);

            // フィルタリングされた問題リストを取得
            const filteredProblems = useMemo(() => {
                if (difficulty === 'all') return problems;
                const filtered = problems.filter(p => p.difficulty === difficulty);
                return filtered.length > 0 ? filtered : problems;
            }, [difficulty]);

            useEffect(() => {
                generateProblem();
            }, [difficulty, isRandom]); // difficultyが変わったら再設定

            const generateProblem = () => {
                if (isRandom) {
                    let available = filteredProblems.filter(p => !problem || p.id !== problem.id);
                    if (available.length === 0) available = filteredProblems;
                    const chosen = available[Math.floor(Math.random() * available.length)];
                    setProblem(chosen);
                    setCurrentIndex(filteredProblems.findIndex(p => p.id === chosen.id));
                } else {
                    const safeIndex = currentIndex < filteredProblems.length ? currentIndex : 0;
                    setProblem(filteredProblems[safeIndex]);
                    setCurrentIndex(safeIndex);
                }
                setShowSolution(false);
            };

            const handleNextProblem = () => {
                if (isRandom) {
                    generateProblem();
                } else {
                    const nextIndex = (currentIndex + 1) % filteredProblems.length;
                    setCurrentIndex(nextIndex);
                    setProblem(filteredProblems[nextIndex]);
                    setShowSolution(false);
                }
            };

            const handlePrevProblem = () => {
                if (!isRandom) {
                    const prevIndex = (currentIndex - 1 + filteredProblems.length) % filteredProblems.length;
                    setCurrentIndex(prevIndex);
                    setProblem(filteredProblems[prevIndex]);
                    setShowSolution(false);
                }
            };

            const handleSelectProblem = (index) => {
                setIsRandom(false);
                setCurrentIndex(index);
                setProblem(filteredProblems[index]);
                setShowSolution(false);
            };

            const handleDifficultyChange = (newDiff) => {
                setDifficulty(newDiff);
                setCurrentIndex(0); // 難易度を変えたら最初から
            };

            if (!problem) return null;

            return (
                <div className="min-h-screen pb-24">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
                        <div className="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold shadow-md">
                                    <IconFileText />
                                </div>
                                <h1 className="text-xl font-bold tracking-tight text-slate-900">高校数学Ⅲ グラフ道場 <span className="text-xs ml-1 bg-slate-200 text-slate-600 px-2 py-1 rounded">全22問</span></h1>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="flex bg-slate-100 p-0.5 rounded-full border border-slate-200">
                                    <button 
                                        onClick={() => setIsRandom(false)}
                                        className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${!isRandom ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        <IconListOrdered />
                                        <span className="hidden sm:inline">一覧から</span>
                                    </button>
                                    <button 
                                        onClick={() => { setIsRandom(true); generateProblem(); }}
                                        className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${isRandom ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        <IconShuffle />
                                        <span className="hidden sm:inline">ランダム</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 py-8 space-y-6 pb-24">
                        
                        {/* Navigation & Difficulty Selector */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="flex flex-col sm:flex-row items-center justify-between gap-4 bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                                <div className="flex justify-center bg-slate-100 p-1 rounded-xl w-full sm:w-auto">
                                    {['all', 1, 2, 3].map(diff => (
                                        <button
                                            key={diff}
                                            onClick={() => handleDifficultyChange(diff)}
                                            className={`px-3 sm:px-4 py-2 rounded-lg text-sm font-bold transition-all flex-1 sm:flex-none ${
                                                difficulty === diff 
                                                    ? 'bg-white text-blue-600 shadow-sm border border-slate-200' 
                                                    : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200/50 border border-transparent'
                                            }`}
                                        >
                                            {diff === 'all' ? 'すべて' : `★${diff} ${DIFFICULTY_LABELS[diff]}`}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="flex items-center gap-2 bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                                {!isRandom && (
                                    <React.Fragment>
                                        <button 
                                            onClick={handlePrevProblem}
                                            className="p-2 rounded-xl text-slate-500 hover:bg-slate-100 hover:text-slate-800 transition-colors"
                                        >
                                            <IconChevronLeft />
                                        </button>
                                        <div className="flex-1 relative">
                                            <select 
                                                value={currentIndex}
                                                onChange={(e) => handleSelectProblem(Number(e.target.value))}
                                                className="w-full appearance-none bg-slate-50 border border-slate-200 text-slate-700 py-2 pl-3 pr-8 rounded-xl font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm overflow-hidden text-ellipsis whitespace-nowrap"
                                            >
                                                {filteredProblems.map((p, idx) => (
                                                    <option key={p.id} value={idx}>
                                                        {idx + 1}. {p.funcText.replace('y = ', '')} (★{p.difficulty})
                                                    </option>
                                                ))}
                                            </select>
                                            <IconChevronDown size={14} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" />
                                        </div>
                                        <button 
                                            onClick={handleNextProblem}
                                            className="p-2 rounded-xl text-slate-500 hover:bg-slate-100 hover:text-slate-800 transition-colors"
                                        >
                                            <IconChevronRight />
                                        </button>
                                    </React.Fragment>
                                )}
                                {isRandom && (
                                    <button 
                                        onClick={() => generateProblem()}
                                        className="w-full flex items-center justify-center gap-2 bg-blue-50 hover:bg-blue-100 text-blue-700 px-4 py-2 rounded-xl font-bold transition-colors"
                                    >
                                        <IconShuffle />
                                        <span>別の問題を引く</span>
                                    </button>
                                )}
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden fade-in">
                            <div className="bg-slate-800 text-white px-6 py-4 flex flex-wrap items-center gap-3">
                                <span className="bg-blue-500 text-xs font-bold px-2 py-1.5 rounded uppercase">Question</span>
                                <span className={`text-xs font-bold px-2 py-1.5 rounded ${
                                    problem.difficulty === 1 ? 'bg-green-500/20 text-green-300' :
                                    problem.difficulty === 2 ? 'bg-yellow-500/20 text-yellow-300' : 'bg-red-500/20 text-red-300'
                                }`}>★{problem.difficulty} {DIFFICULTY_LABELS[problem.difficulty]}</span>
                                <h2 className="text-lg font-medium ml-1">次の関数の増減、極値、漸近線を調べ、グラフの概形をかけ。</h2>
                            </div>
                            <div className="p-8 md:p-12 text-center flex flex-col items-center min-h-[12rem] justify-center overflow-x-auto">
                                <div className="text-4xl md:text-5xl py-4"><MathText math={problem.funcText} /></div>
                                {problem.funcCondition && <div className="text-xl md:text-2xl text-slate-500 mt-2"><RichText text={problem.funcCondition} /></div>}
                            </div>
                        </div>

                        {!showSolution && (
                            <div className="flex justify-center fade-in">
                                <button onClick={() => setShowSolution(true)} className="group flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-full font-bold text-lg shadow-lg">
                                    <span>解答を見る</span>
                                    <IconChevronDown className="group-hover:translate-y-1 transition-transform" />
                                </button>
                            </div>
                        )}

                        {showSolution && (
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-300 slide-down">
                                <div className="bg-blue-50 border-b border-blue-100 p-6 flex items-center gap-3">
                                    <span className="text-blue-600"><IconCheckCircle /></span>
                                    <h2 className="text-2xl font-bold text-slate-800">解答・解説</h2>
                                </div>
                                <div className="p-6 md:p-10 space-y-12">
                                    <section className="space-y-4">
                                        <h3 className="text-xl font-bold flex items-center gap-2"><span className="bg-blue-100 text-blue-700 w-8 h-8 rounded-full flex items-center justify-center text-sm">1</span>導関数</h3>
                                        <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 flex flex-col gap-5 text-xl overflow-x-auto">
                                            <div><RichText text={`$${problem.y1}$`} /></div>
                                            <div><RichText text={`$${problem.y2}$`} /></div>
                                        </div>
                                    </section>
                                    
                                    <section className="space-y-4">
                                        <h3 className="text-xl font-bold flex items-center gap-2"><span className="bg-blue-100 text-blue-700 w-8 h-8 rounded-full flex items-center justify-center text-sm">2</span>増減表</h3>
                                        <Zougenhyou table={problem.table} />
                                    </section>
                                    
                                    <section className="space-y-4">
                                        <h3 className="text-xl font-bold flex items-center gap-2"><span className="bg-blue-100 text-blue-700 w-8 h-8 rounded-full flex items-center justify-center text-sm">3</span>極値・変曲点・漸近線</h3>
                                        <ul className="list-disc list-inside space-y-3 text-lg pl-2 bg-slate-50 p-6 rounded-xl border border-slate-200">
                                            {problem.features.map((ft, i) => <li key={i}><RichText text={ft} /></li>)}
                                        </ul>
                                    </section>
                                    
                                    <section className="space-y-4">
                                        <h3 className="text-xl font-bold flex items-center gap-2"><span className="bg-blue-100 text-blue-700 w-8 h-8 rounded-full flex items-center justify-center text-sm">4</span>グラフの概形</h3>
                                        <GraphPlot plot={problem.plot} />
                                    </section>
                                    
                                    <div className="pt-8 border-t border-slate-200 flex justify-center">
                                        <button onClick={() => { window.scrollTo({top:0, behavior:'smooth'}); setTimeout(()=>handleNextProblem(), 300); }} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-900 text-white px-8 py-4 rounded-full font-bold text-lg shadow-xl shadow-slate-200 transition-all active:scale-95 hover:-translate-y-0.5">
                                            {isRandom ? <IconShuffle /> : <IconChevronRight />}
                                            <span>次の問題に挑戦</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = document.getElementById('root');
        ReactDOM.createRoot(root).render(<App />);
    </script>
